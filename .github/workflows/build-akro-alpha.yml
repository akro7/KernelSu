# ═══════════════════════════════════════════════════════════════
#  AKRO Alpha – GitHub Actions Build Workflow
#  بناء تطبيق AKRO Alpha تلقائياً على GitHub
# ═══════════════════════════════════════════════════════════════
name: Build AKRO Alpha

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'manager/**'
      - '.github/workflows/build-akro-alpha.yml'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-manager:
    name: 🔨 Build AKRO Alpha APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      # ── 2. Java 21 ──────────────────────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ── 3. Android SDK & NDK ────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      # ── 4. Rust (for ksud) ──────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # ── 5. Gradle Cache ─────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 6. Get version info ─────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION_NAME=$(grep -oP '(?<=managerVersionName = ")[^"]+' manager/build.gradle.kts || echo "dev")
          VERSION_CODE=$(grep -oP '(?<=managerVersionCode = )\d+' manager/build.gradle.kts || echo "1")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📦 AKRO Alpha v${VERSION_NAME} (${VERSION_CODE}) @ ${SHORT_SHA}"

      # ── 7. Build Debug APK ──────────────────────────────────
      - name: Build Debug APK
        working-directory: manager
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pkeystore.file="" \
            2>&1 | tail -80

      # ── 8. Build Release APK (if secrets available) ─────────
      - name: Build Release APK
        if: |
          github.event_name != 'pull_request' &&
          secrets.KEYSTORE_FILE != ''
        working-directory: manager
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          KEYSTORE_FILE:     ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > /tmp/release.jks
          ./gradlew :app:assembleRelease \
            --no-daemon \
            -Pkeystore.file=/tmp/release.jks \
            -Pkeystore.password="$KEYSTORE_PASSWORD" \
            -Pkey.alias="$KEY_ALIAS" \
            -Pkey.password="$KEY_PASSWORD"
          rm -f /tmp/release.jks

      # ── 9. Rename outputs ────────────────────────────────────
      - name: Rename APK files
        run: |
          mkdir -p artifacts
          find manager/app/build/outputs/apk -name "*.apk" | while read f; do
            base=$(basename "$f" .apk)
            cp "$f" "artifacts/AKRO_Alpha_${{ steps.version.outputs.name }}_${{ steps.version.outputs.sha }}_${base}.apk"
          done
          ls -lh artifacts/

      # ── 10. Upload Artifact ──────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AKRO-Alpha-${{ steps.version.outputs.name }}-${{ steps.version.outputs.sha }}
          path: artifacts/*.apk
          retention-days: 30

      # ── 11. GitHub Release (manual trigger) ─────────────────
      - name: Create GitHub Release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ steps.version.outputs.sha }}
          name: "AKRO Alpha v${{ steps.version.outputs.name }}"
          body: |
            ## AKRO Alpha – Automatic Build

            **Version:** `${{ steps.version.outputs.name }}` (`${{ steps.version.outputs.code }}`)
            **Commit:** `${{ steps.version.outputs.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            > Built by GitHub Actions 🤖
          files: artifacts/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
